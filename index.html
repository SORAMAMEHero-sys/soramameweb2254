<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>そらまめのホームページ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1fa2ff, #12d8fa, #a6ffcb);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>

    <!-- 左上のTikTokボタン -->
    <a href="https://www.tiktok.com/@your_account" style="position: fixed; top: 15px; left: 15px; background-color: #000000; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <span>🎵</span> TikTok
    </a>

    <!-- 右上の壁紙ボタン（BOOTHのリンクに変更） -->
    <a href="https://soramame-web.booth.pm" target="_blank" style="position: fixed; top: 15px; right: 15px; background-color: #23a6d5; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <span>📥</span> 壁紙
    </a>

    <!-- 真ん中に大きく配置する自己紹介エリア -->
    <div style="text-align: center; padding: 20px;">
        <h1 style="font-size: 32px; margin-bottom: 10px; text-shadow: 0 2px 5px rgba(0,0,0,0.2);">そらまめのホームページへようこそ！</h1>
        <p style="font-size: 16px; margin-bottom: 25px; opacity: 0.9;">ここからどんどん新しい情報をチェックしよう！</p>
        
        <!-- 自己紹介カード -->
        <div style="background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; max-width: 350px; margin: 0 auto; box-shadow: 0 8px 25px rgba(0,0,0,0.25);">
            <h3 style="margin-top: 0; font-size: 22px; margin-bottom: 15px;">💬 自己紹介</h3>
            <p style="font-size: 15px; line-height: 1.6; margin: 0;">
                こんにちは！そらまめです。<br>
                このホームページでは壁紙やいろいろな情報を公開していくよ！よろしくね✨
            </p>
        </div>
    </div>

</body>
</html>
