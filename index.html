<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>そらまめのホームページ</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 60px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff;
            font-family: sans-serif;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* アイコンボタンのデザイン */
        .tiktok-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px; /* アイコンと文字の間のすきま */
            margin-top: 25px;
            padding: 12px 28px;
            background-color: rgba(0, 0, 0, 0.6); /* 黒っぽいガラス風 */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 30px; /* 角を丸くする */
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        /* ボタンに触れたときの動き */
        .tiktok-btn:hover {
            background-color: #000000;
            border-color: #ffffff;
            transform: scale(1.05);
        }

        /* アイコンの大きさ調整 */
        .tiktok-icon {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">そらまめのホームページへようこそ！</h1>
    <p style="text-align: center;">ここからどんどん楽しいものを置いていくよ！</p>

    <!-- TikTokアイコン付きボタン -->
    <a href="https://www.tiktok.com/@soramame.555" class="tiktok-btn" target="_blank">
        <!-- TikTokの公式ロゴ画像を表示するよ -->
        <img src="https://sf16-scmcdn-va.ibytedtos.com/obj/eden-va/uv_zlp/ljhwZthlaukjlkulzlp/tiktok-icon.png" alt="TikTok" class="tiktok-icon">
        TikTokを見る
    </a>
</body>
</html>
